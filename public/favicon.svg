<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Mockifyr">
  <title>Mockifyr</title>
  <!-- Optical size for 16px, not the master mark scaled down: same skeleton, but stroke 10 → 14 and the
       mark fills 94% of the box, which puts the line on ~1.6px at tab scale instead of a sub-pixel 0.84px
       that rendered as grey haze. No tile — a tab strip already has a background, so the ink carries
       itself and follows the browser's theme rather than assuming a light one. -->
  <style>
    .ink { stroke: #111111 }
    .eye { fill: #0a4ecf }
    @media (prefers-color-scheme: dark) {
      .ink { stroke: #ffffff }
      .eye { fill: #5a8dff }
    }
  </style>
  <g transform="translate(2 16.4) scale(0.4651)">
    <g class="ink" fill="none" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 7 L44 33.5 L7 60"/>
      <path d="M122 7 L85 33.5 L122 60"/>
      <path d="M44 33.5 L64.5 48 L85 33.5"/>
    </g>
    <circle class="eye" cx="64.5" cy="17" r="9"/>
  </g>
</svg>
